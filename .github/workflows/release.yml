name: release
on:
  push:
    tags: ["v*"]

permissions:
  contents: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - run: pip install numpy opencv-python-headless pytest
      - run: ./check.sh

  python-dist:
    needs: check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: pip install build
      - run: python -m build
      - uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  pypi-publish:
    needs: python-dist
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write  # trusted publishing (OIDC), no stored token
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  cli-dist:
    needs: check
    strategy:
      matrix:
        include:
          - { os: ubuntu-latest, target: x86_64-unknown-linux-gnu }
          - { os: ubuntu-latest, target: aarch64-unknown-linux-gnu, cross: true }
          - { os: macos-latest,   target: aarch64-apple-darwin }
          - { os: windows-latest, target: x86_64-pc-windows-msvc }
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: rust
      - name: install cross linker
        if: matrix.cross
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu
      - name: build
        run: cargo build --release -p simittag-cli --manifest-path rust/Cargo.toml --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
      - name: package
        shell: bash
        run: |
          name=simittag-${{ github.ref_name }}-${{ matrix.target }}
          mkdir -p "$name"
          cp "rust/target/${{ matrix.target }}/release/simittag${{ matrix.os == 'windows-latest' && '.exe' || '' }}" "$name/"
          cp README.md LICENSE "$name/"
          if [ "${{ matrix.os }}" = "windows-latest" ]; then
            7z a "$name.zip" "$name"
          else
            tar czf "$name.tar.gz" "$name"
          fi
      - uses: actions/upload-artifact@v4
        with:
          name: cli-${{ matrix.target }}
          path: |
            simittag-*.tar.gz
            simittag-*.zip

  github-release:
    needs: [python-dist, cli-dist]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/*.whl
            artifacts/*.tar.gz
            artifacts/*.zip
          generate_release_notes: true
